<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Hello world</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: Arial, sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; min-height: 100vh; }
		main { flex: 1; padding: 20px; }
		h1 { color: #333; margin-bottom: 20px; }
		/* Modal Styles removed: using Netlify Identity widget */
		/* Footer Styles */
		footer { background-color: #f8f9fa; border-top: 1px solid #dee2e6; padding: 20px; text-align: center; font-size: 14px; }
		.private-access-link { color: #6c757d; text-decoration: none; transition: color 0.3s; cursor: pointer; }
		.private-access-link:hover { color: #007bff; text-decoration: underline; }
		.admin-button { background-color: #28a745; color: white; padding: 8px 16px; border-radius: 4px; text-decoration: none; cursor: pointer; display: inline-block; margin-top: 10px; transition: background-color 0.3s; }
		.logout-button { background-color: #dc3545; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; border: none; transition: background-color 0.3s; }
		.logout-button:hover { background-color: #c82333; }
		.user-info { color: #333; font-weight: bold; }
	</style>
</head>
<body>
	<!-- Navbar Bootstrap -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="index.html">Mi Sitio</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link active" aria-current="page" href="inicio.html">Inicio</a></li>
					<li class="nav-item"><a class="nav-link" href="sobre.html">Sobre Mí</a></li>
					<li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
					<li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
					<li class="nav-item" id="adminMenuitem" style="display: none;"><a class="nav-link" href="admin.html">Panel Admin</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Contenido Principal -->
	<main class="container">
		<h1>Bienvenido</h1>
		<p>Este es el contenido principal de tu sitio web.</p>
		<div id="userStatusDiv"></div>
	</main>

	<!-- Footer con enlace de acceso privado -->
	<footer>
		<p>&copy; 2024 Mi Sitio. Todos los derechos reservados.</p>
		<p><a class="private-access-link" id="accessLink">acceso privado</a></p>
	</footer>

	<!-- Netlify Identity widget -->
	<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- Netlify Identity widget -->
	<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script>
		if (window.netlifyIdentity) netlifyIdentity.init();

		// UI handlers
		const accessLink = document.getElementById('accessLink');
		accessLink.addEventListener('click', () => netlifyIdentity.open());

		netlifyIdentity.on && netlifyIdentity.on('login', user => {
			// store minimal UI info locally (no passwords)
			localStorage.setItem('userLogged', JSON.stringify({ email: user.email, loginTime: new Date().toLocaleString() }));
			updateUI();
		});
		netlifyIdentity.on && netlifyIdentity.on('logout', () => {
			localStorage.removeItem('userLogged');
			updateUI();
		});

		function updateUI(){
			const adminMenu = document.getElementById('adminMenuitem');
			const userStatusDiv = document.getElementById('userStatusDiv');
			const userLogged = localStorage.getItem('userLogged');
			if (userLogged) {
				const user = JSON.parse(userLogged);
				adminMenu.style.display = 'block';
				userStatusDiv.innerHTML = `<div style="background-color: #d4edda; padding: 15px; border-radius: 4px; margin-top: 20px; border: 1px solid #c3e6cb;"><p class="user-info">✅ Sesión activa como: ${user.email}</p><button class="logout-button" id="logoutBtn">Cerrar Sesión</button></div>`;
				const btn = document.getElementById('logoutBtn');
				if (btn) btn.addEventListener('click', () => { netlifyIdentity.logout(); });
			} else {
				adminMenu.style.display = 'none';
				userStatusDiv.innerHTML = '';
			}
		}

		// initialize UI on load
		window.addEventListener('DOMContentLoaded', () => updateUI());
	</script>
</body>
</html>
