<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Projects</title>
	<link rel="stylesheet" href="style.css?v=26">
</head>
<body>

	<nav class="nav">
		<div class="nav-inner">
			<a href="index.html" class="brand"><img src="Resources/FotoCV.jpg" alt="" class="brand-avatar"> Isabel García Méndez</a>
			<button class="nav-toggle" id="navToggle" aria-label="Abrir menú">☰</button>
			<ul class="nav-links" id="navLinks">
				<li><a href="index.html">About me</a></li>
				<li><a href="cv.html">Curriculum Vitae</a></li>
				<li><a href="projects.html" class="active">Projects</a></li>
				<li id="adminMenuitem" style="display:none;"><a href="admin.html">Panel admin</a></li>
			</ul>
		</div>
	</nav>

	<main>
		<section class="hero" style="padding-bottom: 60px;">
			<div class="wrap">
				<span class="eyebrow mono">// catálogo completo</span>
				<h1 style="font-size: clamp(2rem, 4vw, 3rem);">Proyectos</h1>
				<p class="lead">Cada entrada incluye el planteamiento, el stack usado y enlaces al código o la demo en vivo.</p>
			</div>
		</section>

		<section class="section">
			<div class="wrap">
				<div class="project-grid" id="projectGrid">
					<div class="empty-state"><span class="mono">cargando…</span></div>
				</div>
			</div>
		</section>
	</main>

	<footer>
		<div class="footer-inner">
			<span>&copy; 2026</span>
			<a class="priv" id="accessLink" onclick="openLoginModal()">Private access</a>
		</div>
	</footer>

	<!-- Modal de login -->
	<div id="loginModal" class="overlay">
		<div class="panel small">
			<button class="panel-close" onclick="closeLoginModal()">&times;</button>
			<div class="panel-body form-body">
				<span class="idx mono">ACCESO</span>
				<h3>Iniciar sesión</h3>
				<div id="loginError" class="form-error">Email o contraseña incorrectos.</div>
				<form onsubmit="handleLogin(event)">
					<div class="field">
						<label for="loginEmail">Email</label>
						<input type="email" id="loginEmail" required>
					</div>
					<div class="field">
						<label for="loginPassword">Contraseña</label>
						<input type="password" id="loginPassword" required>
					</div>
					<button type="submit" class="btn" style="width:100%; justify-content:center;">Entrar</button>
				</form>
			</div>
		</div>
	</div>

	<!-- Modal de detalle de proyecto -->
	<div id="projectModal" class="overlay">
		<div class="panel">
			<button class="panel-close" onclick="closeProjectModal()">&times;</button>
			<div id="projectModalContent"></div>
		</div>
	</div>

	<script type="module">
		import { login, watchAuth, watchProjects } from './firebase-config.js';

		document.getElementById('navToggle').addEventListener('click', () => {
			document.getElementById('navLinks').classList.toggle('open');
		});

		watchAuth((user) => {
			const adminMenu = document.getElementById('adminMenuitem');
			if (adminMenu) adminMenu.style.display = user ? 'block' : 'none';
		});

		const loginModal = document.getElementById('loginModal');
		window.openLoginModal = function () {
			document.getElementById('loginError').classList.remove('show');
			document.getElementById('loginEmail').value = '';
			document.getElementById('loginPassword').value = '';
			loginModal.classList.add('active');
		};
		window.closeLoginModal = function () { loginModal.classList.remove('active'); };
		window.handleLogin = function (event) {
			event.preventDefault();
			const email = document.getElementById('loginEmail').value;
			const password = document.getElementById('loginPassword').value;
			const errorDiv = document.getElementById('loginError');
			login(email, password)
				.then(() => { closeLoginModal(); })
				.catch(() => {
					errorDiv.classList.add('show');
					document.getElementById('loginPassword').value = '';
				});
		};
		window.addEventListener('click', (e) => { if (e.target === loginModal) closeLoginModal(); });

		const projectGrid = document.getElementById('projectGrid');
		let allProjects = [];

		watchProjects((projects) => {
			allProjects = projects.filter(p => p.isPublic !== false);
			renderGrid(allProjects);
		});

		function escapeHtml(str) {
			const div = document.createElement('div');
			div.textContent = str || '';
			return div.innerHTML;
		}

		function renderGrid(projects) {
			if (!projects.length) {
				projectGrid.innerHTML = `<div class="empty-state"></div>`;
				return;
			}
			projectGrid.innerHTML = projects.map((p, i) => `
				<div class="project-card" onclick="openProjectModal('${p.id}')">
					<div class="thumb"><img src="${escapeHtml(p.imageUrl)}" alt="${escapeHtml(p.title)}" loading="lazy"></div>
					<span class="idx mono">PRY / ${String(i + 1).padStart(2, '0')}</span>
					<h3>${escapeHtml(p.title)}</h3>
					<p class="desc">${escapeHtml(p.description)}</p>
					<div class="tags">
						${(p.stack || []).slice(0, 4).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}
					</div>
				</div>
			`).join('');
		}

		const projectModal = document.getElementById('projectModal');
		window.openProjectModal = function (id) {
			const p = allProjects.find(x => x.id === id);
			if (!p) return;
			document.getElementById('projectModalContent').innerHTML = `
				<div class="thumb-lg"><img src="${escapeHtml(p.modalImageUrl || p.imageUrl)}" alt="${escapeHtml(p.title)}"></div>
				<div class="panel-body">
					<span class="idx mono">PROYECTO</span>
					<h3>${escapeHtml(p.title)}</h3>
					<p class="desc">${escapeHtml(p.description)}</p>
					<div class="tags">${(p.stack || []).map(t => `<span class="tag-pill">${escapeHtml(t)}</span>`).join('')}</div>
					<div class="links">
						${p.githubUrl ? `<a href="${escapeHtml(p.githubUrl)}" target="_blank" rel="noopener" class="btn btn-outline btn-sm">Ver código</a>` : ''}
						${p.demoUrl ? `<a href="${escapeHtml(p.demoUrl)}" target="_blank" rel="noopener" class="btn btn-sm">Ver demo</a>` : ''}
					</div>
				</div>
			`;
			projectModal.classList.add('active');
		};
		window.closeProjectModal = function () { projectModal.classList.remove('active'); };
		window.addEventListener('click', (e) => { if (e.target === projectModal) closeProjectModal(); });
	</script>
</body>
</html>
